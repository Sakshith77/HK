<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Edit Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ══ TOKENS ══════════════════════════════════════════ */
:root{
  --bg:#0a0a0d;
  --surface:#111116;
  --surface2:#18181f;
  --surface3:#1f1f28;
  --border:#252530;
  --border2:#2e2e3d;
  --accent:#e8621a;
  --accent2:#ff9447;
  --blue:#3d8aff;
  --green:#2ecc71;
  --text:#e0e0ec;
  --text2:#8888a0;
  --text3:#555568;
  --playhead:#ff4444;
  --track-video:#1e3a5f;
  --track-audio:#1a3d2e;
  --track-h:52px;
  --ruler-h:28px;
  --toolbar-h:48px;
  --panel-w:240px;
  --monitor-bg:#000;
  --radius:6px;
  --mono:'DM Mono',monospace;
  --sans:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}

/* ══ TOOLBAR ══════════════════════════════════════════ */
#toolbar{
  height:var(--toolbar-h);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:2px;padding:0 10px;
  position:relative;z-index:30;flex-shrink:0;
}
.tb-logo{
  font-family:var(--mono);font-size:.8rem;font-weight:500;
  color:var(--accent);letter-spacing:.12em;margin-right:12px;
  white-space:nowrap;
}
.tb-group{display:flex;align-items:center;gap:2px;}
.tb-sep{width:1px;height:24px;background:var(--border2);margin:0 6px;flex-shrink:0;}
.tb-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:5px;
  border:none;background:transparent;
  color:var(--text2);font-family:var(--sans);font-size:.72rem;font-weight:600;
  cursor:pointer;transition:all .14s;white-space:nowrap;
  letter-spacing:.02em;
}
.tb-btn:hover{background:var(--surface3);color:var(--text);}
.tb-btn.active{background:var(--accent);color:#fff;}
.tb-btn.accent{background:rgba(232,98,26,.15);color:var(--accent);border:1px solid rgba(232,98,26,.25);}
.tb-btn.accent:hover{background:var(--accent);color:#fff;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.tb-time{
  font-family:var(--mono);font-size:.8rem;color:var(--text2);
  background:var(--surface2);padding:4px 10px;border-radius:5px;
  border:1px solid var(--border);letter-spacing:.08em;
}

/* ══ LAYOUT ══════════════════════════════════════════ */
#app{
  display:grid;
  grid-template-columns:var(--panel-w) 1fr;
  grid-template-rows:1fr auto;
  height:calc(100dvh - var(--toolbar-h));
}
/* mobile: stack vertically */
@media(max-width:720px){
  #app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;}
  #left-panel{display:none;}
  #left-panel.open{display:flex;position:fixed;inset:var(--toolbar-h) 0 0 0;z-index:40;background:var(--surface);width:100%;max-width:320px;}
  :root{--panel-w:0px;}
}

/* ══ LEFT PANEL ══════════════════════════════════════ */
#left-panel{
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  grid-row:1/3;
}
.panel-section{flex-shrink:0;border-bottom:1px solid var(--border);}
.panel-header{
  padding:8px 12px;font-size:.68rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-header span{color:var(--text);}

/* media library */
#media-list{
  flex:1;overflow-y:auto;padding:6px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.media-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 8px;border-radius:5px;cursor:pointer;
  border:1px solid transparent;transition:all .13s;margin-bottom:2px;
}
.media-item:hover{background:var(--surface2);}
.media-item.selected{background:rgba(232,98,26,.12);border-color:rgba(232,98,26,.3);}
.media-thumb{
  width:44px;height:30px;border-radius:3px;object-fit:cover;
  background:var(--surface3);flex-shrink:0;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;
}
.media-info{flex:1;min-width:0;}
.media-name{font-size:.72rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.media-meta{font-size:.62rem;color:var(--text3);font-family:var(--mono);}
.add-btn{
  width:100%;padding:8px;border-radius:5px;border:1px dashed var(--border2);
  background:transparent;color:var(--text3);font-family:var(--sans);font-size:.72rem;
  cursor:pointer;transition:all .14s;margin:6px 0;
}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* track controls in panel */
#track-controls{padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.tc-row{display:flex;align-items:center;gap:6px;}
.tc-label{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--text3);width:28px;}
.tc-range{flex:1;accent-color:var(--accent);cursor:pointer;height:3px;}
.tc-val{font-family:var(--mono);font-size:.65rem;color:var(--accent);width:30px;text-align:right;}

/* ══ CENTER — MONITOR + TIMELINE ═══════════════════════ */
#center{display:flex;flex-direction:column;overflow:hidden;}

/* monitor */
#monitor-wrap{
  flex:1;background:var(--monitor-bg);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;min-height:120px;
}
#monitor-canvas{max-width:100%;max-height:100%;display:block;}
#video-player{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;opacity:0;pointer-events:none;
}
#monitor-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  padding:8px 14px 10px;
  display:flex;align-items:center;gap:10px;
}
.mon-btn{
  width:30px;height:30px;border-radius:50%;border:none;
  background:rgba(255,255,255,.12);color:#fff;
  font-size:.85rem;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.mon-btn:hover{background:var(--accent);}
.mon-btn.main{width:38px;height:38px;background:var(--accent);font-size:1rem;}
#mon-time{font-family:var(--mono);font-size:.75rem;color:rgba(255,255,255,.7);margin-left:auto;}
#mon-vol-wrap{display:flex;align-items:center;gap:5px;}
#mon-vol{width:60px;accent-color:var(--accent);}
#empty-monitor{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:absolute;inset:0;color:var(--text3);gap:8px;pointer-events:none;
}
#empty-monitor .em-icon{font-size:2.5rem;opacity:.3;}
#empty-monitor p{font-size:.78rem;}

/* ══ TIMELINE ═══════════════════════════════════════ */
#timeline-section{
  flex-shrink:0;
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;flex-direction:column;
  height:clamp(180px,32vh,280px);
  overflow:hidden;
}
#timeline-toolbar{
  height:32px;display:flex;align-items:center;gap:4px;
  padding:0 8px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.tl-btn{
  padding:3px 9px;border-radius:4px;border:none;
  background:transparent;color:var(--text2);
  font-family:var(--sans);font-size:.68rem;font-weight:600;
  cursor:pointer;transition:all .13s;letter-spacing:.02em;
}
.tl-btn:hover{background:var(--surface3);color:var(--text);}
.tl-btn.active{background:var(--accent);color:#fff;}
#zoom-display{font-family:var(--mono);font-size:.65rem;color:var(--text3);margin-left:auto;padding-right:4px;}

#timeline-body{
  display:flex;flex:1;overflow:hidden;
}
#track-headers{
  width:80px;flex-shrink:0;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  background:var(--surface);
  overflow:hidden;
}
.track-header{
  height:var(--track-h);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border-bottom:1px solid var(--border);padding:4px;
}
.th-label{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);}
.th-icon{font-size:.85rem;}
.th-mute{
  width:18px;height:18px;border-radius:3px;border:none;
  background:var(--surface3);color:var(--text3);font-size:.55rem;
  cursor:pointer;transition:all .13s;font-family:var(--mono);
}
.th-mute:hover{background:var(--accent2);color:#fff;}
.th-mute.muted{background:var(--accent);color:#fff;}

#timeline-scroll{
  flex:1;overflow:auto;position:relative;
  scrollbar-width:thin;scrollbar-color:var(--border) var(--surface2);
}
#timeline-canvas-wrap{position:relative;}
#ruler-canvas{display:block;cursor:pointer;}
#tracks-canvas{display:block;cursor:pointer;}
#playhead-line{
  position:absolute;top:0;bottom:0;
  width:2px;background:var(--playhead);
  pointer-events:none;z-index:10;
  box-shadow:0 0 8px rgba(255,68,68,.5);
  transform:translateX(0);
  will-change:transform;
}
#playhead-head{
  position:absolute;top:0;left:-5px;
  width:12px;height:12px;
  background:var(--playhead);
  clip-path:polygon(0 0,100% 0,50% 100%);
}

/* ══ STATUS BAR ═══════════════════════════════════════ */
#statusbar{
  height:22px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 12px;
  font-family:var(--mono);font-size:.6rem;color:var(--text3);
  grid-column:1/-1;flex-shrink:0;
}
.sb-s span{color:var(--accent);}

/* ══ MOBILE PANEL TOGGLE ═══════════════════════════════ */
#panel-fab{
  display:none;position:fixed;left:12px;bottom:80px;z-index:50;
  width:42px;height:42px;border-radius:50%;
  background:var(--accent);border:none;color:#fff;
  font-size:1.1rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(232,98,26,.4);
  align-items:center;justify-content:center;
}
@media(max-width:720px){#panel-fab{display:flex;}}

/* ══ TOOLTIP ═════════════════════════════════════════ */
.tip{position:relative;}
.tip::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#222;color:#fff;font-size:.62rem;
  padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:100;
}
.tip:hover::after{opacity:1;}

/* ══ SCROLLBAR ═══════════════════════════════════════ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="tb-logo">◆ EDIT</div>

  <div class="tb-group">
    <button class="tb-btn tip" data-tip="Add Video/Audio" onclick="triggerUpload('media')">＋ Media</button>
    <input type="file" id="file-media" multiple accept="video/*,audio/*" style="display:none" onchange="loadMedia(this)">
  </div>

  <div class="tb-sep"></div>

  <!-- Tools -->
  <div class="tb-group">
    <button class="tb-btn active tip" data-tip="Select (V)" id="tool-select" onclick="setTool('select')">↖</button>
    <button class="tb-btn tip" data-tip="Razor/Split (C)" id="tool-razor" onclick="setTool('razor')">✂</button>
    <button class="tb-btn tip" data-tip="Hand/Pan (H)" id="tool-hand" onclick="setTool('hand')">✋</button>
  </div>

  <div class="tb-sep"></div>

  <!-- Playback -->
  <div class="tb-group">
    <button class="tb-btn tip" data-tip="Go to Start" onclick="gotoStart()">⏮</button>
    <button class="tb-btn tip" data-tip="Play/Pause (Space)" id="play-btn" onclick="togglePlay()">▶</button>
    <button class="tb-btn tip" data-tip="Go to End" onclick="gotoEnd()">⏭</button>
  </div>

  <div class="tb-sep"></div>

  <button class="tb-btn tip" data-tip="Split clip at playhead" onclick="splitAtPlayhead()">✂ Split</button>
  <button class="tb-btn tip" data-tip="Delete selected clip" onclick="deleteSelected()" style="color:#ff6b6b">🗑</button>
  <div class="tb-sep"></div>
  <button class="tb-btn tip" data-tip="Undo (Ctrl+Z)" id="btn-undo" onclick="undo()" style="opacity:.3" disabled>↩ Undo</button>
  <button class="tb-btn tip" data-tip="Redo (Alt+Z)" id="btn-redo" onclick="redo()" style="opacity:.3" disabled>↪ Redo</button>

  <div class="tb-right">
    <div class="tb-time" id="tb-timecode">00:00:00:00</div>
    <button class="tb-btn accent tip" data-tip="Export (coming soon)" onclick="showExportInfo()">⬇ Export</button>
  </div>
</div>

<!-- APP BODY -->
<div id="app">

  <!-- LEFT PANEL -->
  <div id="left-panel">

    <!-- Media Library -->
    <div class="panel-section" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="panel-header">Media Library <span id="media-count">0</span></div>
      <div style="padding:6px 8px;">
        <button class="add-btn" onclick="triggerUpload('media')">＋ Add Video / Audio</button>
      </div>
      <div id="media-list"></div>
    </div>

    <!-- Clip Properties -->
    <div class="panel-section">
      <div class="panel-header">Clip Properties</div>
      <div id="track-controls">
        <div class="tc-row">
          <div class="tc-label">Vol</div>
          <input type="range" class="tc-range" id="clip-vol" min="0" max="2" step="0.01" value="1" oninput="setClipVolume(this.value)">
          <div class="tc-val" id="clip-vol-val">100%</div>
        </div>
        <div class="tc-row">
          <div class="tc-label">Spd</div>
          <input type="range" class="tc-range" id="clip-speed" min="0.25" max="4" step="0.25" value="1" oninput="setClipSpeed(this.value)">
          <div class="tc-val" id="clip-speed-val">1×</div>
        </div>
        <div style="padding:4px 0;font-size:.62rem;color:var(--text3);font-family:var(--mono)" id="clip-info">No clip selected</div>
      </div>
    </div>

  </div>

  <!-- CENTER (monitor + timeline) -->
  <div id="center">

    <!-- Monitor -->
    <div id="monitor-wrap">
      <div id="empty-monitor">
        <div class="em-icon">🎬</div>
        <p>Add media and drag to timeline</p>
      </div>
      <video id="video-player" preload="auto" playsinline></video>
      <canvas id="monitor-canvas"></canvas>
      <div id="monitor-overlay">
        <button class="mon-btn tip" data-tip="Go to Start" onclick="gotoStart()">⏮</button>
        <button class="mon-btn tip" data-tip="Step Back" onclick="stepBack()">◀</button>
        <button class="mon-btn main tip" data-tip="Play/Pause (Space)" id="mon-play-btn" onclick="togglePlay()">▶</button>
        <button class="mon-btn tip" data-tip="Step Forward" onclick="stepForward()">▶</button>
        <button class="mon-btn tip" data-tip="Go to End" onclick="gotoEnd()">⏭</button>
        <div id="mon-time">00:00 / 00:00</div>
        <div id="mon-vol-wrap">
          🔊 <input type="range" id="mon-vol" min="0" max="1" step="0.01" value="1" oninput="setMasterVol(this.value)">
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline-section">
      <div id="timeline-toolbar">
        <button class="tl-btn tip" data-tip="Zoom In" onclick="zoomIn()">＋</button>
        <button class="tl-btn tip" data-tip="Zoom Out" onclick="zoomOut()">－</button>
        <button class="tl-btn tip" data-tip="Fit all clips in view" onclick="zoomFit()">⤢ Fit</button>
        <button class="tl-btn tip" data-tip="Snap to grid" id="snap-btn" onclick="toggleSnap()">⊡ Snap</button>
        <button class="tl-btn tip" data-tip="Ripple delete gap" onclick="rippleGaps()">⇥ Ripple</button>
        <div id="zoom-display">1×</div>
      </div>
      <div id="timeline-body">
        <div id="track-headers">
          <!-- filled by JS -->
        </div>
        <div id="timeline-scroll">
          <div id="timeline-canvas-wrap">
            <canvas id="ruler-canvas" height="28"></canvas>
            <canvas id="tracks-canvas"></canvas>
            <div id="playhead-line"><div id="playhead-head"></div></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div class="sb-s">Clips: <span id="sb-clips">0</span></div>
    <div class="sb-s">Duration: <span id="sb-dur">0:00</span></div>
    <div class="sb-s">Playhead: <span id="sb-ph">0:00</span></div>
    <div class="sb-s">Tool: <span id="sb-tool">Select</span></div>
    <div class="sb-s" style="margin-left:auto">Edit Studio · Hare Krishna 🪷</div>
  </div>

</div>

<!-- Mobile FAB -->
<button id="panel-fab" onclick="toggleMobilePanel()">☰</button>

<script>
/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let mediaAssets=[];   // {id,name,type,url,duration,videoEl,audioEl}

// ── UNDO / REDO ──
let undoStack=[];
let redoStack=[];
const MAX_HISTORY=50;

function saveState(){
  // snapshot only tracks (clips data) — lightweight
  const snapshot=JSON.parse(JSON.stringify(tracks.map(t=>({
    id:t.id, label:t.label, type:t.type, muted:t.muted,
    clips:t.clips.map(c=>({...c, _videoEl:undefined}))
  }))));
  undoStack.push(snapshot);
  if(undoStack.length>MAX_HISTORY) undoStack.shift();
  redoStack=[]; // clear redo on new action
  updateUndoRedoBtns();
}

function undo(){
  if(!undoStack.length) return;
  // save current to redo
  const current=JSON.parse(JSON.stringify(tracks.map(t=>({
    id:t.id, label:t.label, type:t.type, muted:t.muted,
    clips:t.clips.map(c=>({...c, _videoEl:undefined}))
  }))));
  redoStack.push(current);
  const prev=undoStack.pop();
  restoreState(prev);
  updateUndoRedoBtns();
}

function redo(){
  if(!redoStack.length) return;
  const current=JSON.parse(JSON.stringify(tracks.map(t=>({
    id:t.id, label:t.label, type:t.type, muted:t.muted,
    clips:t.clips.map(c=>({...c, _videoEl:undefined}))
  }))));
  undoStack.push(current);
  const next=redoStack.pop();
  restoreState(next);
  updateUndoRedoBtns();
}

function restoreState(snapshot){
  tracks=snapshot.map(t=>({...t}));
  selectedClipId=null;
  recalcDuration();
  renderTimeline();
  updateStatus();
  updateClipProps();
}

function updateUndoRedoBtns(){
  const u=document.getElementById('btn-undo');
  const r=document.getElementById('btn-redo');
  if(u){ u.style.opacity=undoStack.length?'1':'.3'; u.disabled=!undoStack.length; }
  if(r){ r.style.opacity=redoStack.length?'1':'.3'; r.disabled=!redoStack.length; }
}
let tracks=[
  {id:0,label:'V1',type:'video',clips:[],muted:false,gainNode:null},
  {id:1,label:'A1',type:'audio',clips:[],muted:false,gainNode:null},
  {id:2,label:'A2',type:'audio',clips:[],muted:false,gainNode:null},
];
// clip: {id,assetId,trackId,startTime,endTime,inPoint,outPoint,volume,speed,color}
let uid=0;
let currentTime=0;   // seconds
let duration=0;      // total project duration
let isPlaying=false;
let playStartWallClock=0;
let playStartTime=0;
let rafId=null;
let selectedClipId=null;
let tool='select';   // select | razor | hand
let zoom=100;        // px per second
let snapEnabled=true;
let isDraggingClip=false, dragClipId=null, dragOffsetX=0, dragTrackId=null;
let isScrubbingRuler=false;
let isPanningTL=false, panTLStart={x:0,scrollLeft:0};

// Audio
let audioCtx=null;
let masterGain=null;

// Canvas refs
const monCanvas=document.getElementById('monitor-canvas');
const monCtx=monCanvas.getContext('2d');
const rulerCanvas=document.getElementById('ruler-canvas');
const rulerCtx=rulerCanvas.getContext('2d');
const tracksCanvas=document.getElementById('tracks-canvas');
const tracksCtx=tracksCanvas.getContext('2d');

const TRACK_H=52;
const RULER_H=28;
const COLORS_VIDEO=['#1e4d7b','#1b4568','#234873','#1a3d5c'];
const COLORS_AUDIO=['#1a4d30','#1e5235','#194528','#1b4a2e'];

/* ══════════════════════════════════════════════════════
   AUDIO CONTEXT
══════════════════════════════════════════════════════ */
function ensureAudioCtx(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.connect(audioCtx.destination);
}

/* ══════════════════════════════════════════════════════
   MEDIA LOADING
══════════════════════════════════════════════════════ */
function triggerUpload(){ document.getElementById('file-media').click(); }

function loadMedia(input){
  const files=[...input.files];
  files.forEach(file=>{
    const url=URL.createObjectURL(file);
    const isVideo=file.type.startsWith('video/');
    const asset={
      id:++uid,
      name:file.name.replace(/\.[^.]+$/,''),
      type:isVideo?'video':'audio',
      url,
      duration:0,
      file
    };
    // get duration
    const probe=isVideo?document.createElement('video'):document.createElement('audio');
    probe.src=url; probe.preload='metadata';
    probe.onloadedmetadata=()=>{
      asset.duration=probe.duration;
      asset.probe=probe;
      mediaAssets.push(asset);
      renderMediaList();
    };
  });
  input.value='';
}

function renderMediaList(){
  const list=document.getElementById('media-list');
  list.innerHTML=mediaAssets.map(a=>`
    <div class="media-item" id="mi-${a.id}" ondblclick="addToTimeline(${a.id})">
      <div class="media-thumb">${a.type==='video'?'🎬':'🎵'}</div>
      <div class="media-info">
        <div class="media-name">${a.name}</div>
        <div class="media-meta">${a.type} · ${fmtTime(a.duration)}</div>
      </div>
    </div>`).join('');
  document.getElementById('media-count').textContent=mediaAssets.length;
}

/* ══════════════════════════════════════════════════════
   ADD TO TIMELINE
══════════════════════════════════════════════════════ */
function addToTimeline(assetId){
  const asset=mediaAssets.find(a=>a.id===assetId);
  if(!asset) return;
  // find appropriate track
  const trackType=asset.type==='video'?'video':'audio';
  let track=tracks.find(t=>t.type===trackType);
  if(!track) return;

  // place after last clip
  const lastEnd=track.clips.reduce((m,c)=>Math.max(m,c.endTime),0);
  const clip={
    id:++uid,
    assetId,
    trackId:track.id,
    startTime:lastEnd,
    endTime:lastEnd+asset.duration,
    inPoint:0,
    outPoint:asset.duration,
    volume:1,
    speed:1,
    color:trackType==='video'?COLORS_VIDEO[track.clips.length%4]:COLORS_AUDIO[track.clips.length%4],
    name:asset.name
  };
  saveState();
  track.clips.push(clip);
  recalcDuration();
  renderTimeline();
  updateStatus();
  document.getElementById('empty-monitor').style.display='none';
  selectedClipId=clip.id;
  updateClipProps();
}

function recalcDuration(){
  let d=0;
  tracks.forEach(t=>t.clips.forEach(c=>{ if(c.endTime>d) d=c.endTime; }));
  duration=d||0;
  document.getElementById('sb-dur').textContent=fmtTime(duration);
}

/* ══════════════════════════════════════════════════════
   PLAYBACK ENGINE
══════════════════════════════════════════════════════ */
function togglePlay(){
  if(isPlaying) pause(); else play();
}

function play(){
  ensureAudioCtx();
  if(audioCtx.state==='suspended') audioCtx.resume();
  isPlaying=true;
  playStartWallClock=performance.now();
  playStartTime=currentTime;
  document.getElementById('play-btn').textContent='⏸';
  document.getElementById('mon-play-btn').textContent='⏸';
  // sync active video
  syncVideoPlayback();
  rafId=requestAnimationFrame(renderLoop);
}

function pause(){
  isPlaying=false;
  cancelAnimationFrame(rafId);
  document.getElementById('play-btn').textContent='▶';
  document.getElementById('mon-play-btn').textContent='▶';
  // pause all active videos
  tracks.forEach(t=>t.clips.forEach(c=>{
    if(c._videoEl) c._videoEl.pause();
  }));
}

function gotoStart(){ seekTo(0); }
function gotoEnd(){ seekTo(duration); }
function stepBack(){ seekTo(Math.max(0,currentTime-1/30)); }
function stepForward(){ seekTo(Math.min(duration,currentTime+1/30)); }

function seekTo(t){
  currentTime=Math.max(0,Math.min(duration,t));
  playStartTime=currentTime;
  playStartWallClock=performance.now();
  updatePlayhead();
  updateTimecodes();
  if(isPlaying) syncVideoPlayback();
  renderMonitor();
}

function syncVideoPlayback(){
  tracks.forEach(t=>{
    if(t.type!=='video') return;
    t.clips.forEach(c=>{
      const asset=mediaAssets.find(a=>a.id===c.assetId);
      if(!asset||asset.type!=='video') return;
      if(currentTime>=c.startTime && currentTime<c.endTime){
        if(!c._videoEl){
          c._videoEl=document.createElement('video');
          c._videoEl.src=asset.url;
          c._videoEl.preload='auto';
          c._videoEl.muted=t.muted;
        }
        const vt=(currentTime-c.startTime)*c.speed+c.inPoint;
        c._videoEl.currentTime=vt;
        if(isPlaying && c._videoEl.paused) c._videoEl.play().catch(()=>{});
      } else {
        if(c._videoEl && !c._videoEl.paused) c._videoEl.pause();
      }
    });
  });
}

function renderLoop(){
  if(!isPlaying){ rafId=null; return; }
  const elapsed=(performance.now()-playStartWallClock)/1000;
  currentTime=playStartTime+elapsed;
  if(currentTime>=duration && duration>0){ seekTo(0); pause(); return; }
  updatePlayhead();
  updateTimecodes();
  renderMonitor();
  rafId=requestAnimationFrame(renderLoop);
}

/* ══════════════════════════════════════════════════════
   MONITOR RENDER
══════════════════════════════════════════════════════ */
function resizeMonitor(){
  const wrap=document.getElementById('monitor-wrap');
  const W=wrap.clientWidth, H=wrap.clientHeight-50;
  monCanvas.width=W; monCanvas.height=H;
}

function renderMonitor(){
  const W=monCanvas.width, H=monCanvas.height;
  monCtx.fillStyle='#000';
  monCtx.fillRect(0,0,W,H);

  // find active video clip
  let drew=false;
  tracks.forEach(t=>{
    if(t.type!=='video') return;
    t.clips.forEach(c=>{
      if(currentTime>=c.startTime && currentTime<c.endTime && c._videoEl && c._videoEl.readyState>=2){
        // letterbox
        const vW=c._videoEl.videoWidth||640, vH=c._videoEl.videoHeight||360;
        const scale=Math.min(W/vW,H/vH);
        const dw=vW*scale, dh=vH*scale;
        const dx=(W-dw)/2, dy=(H-dh)/2;
        monCtx.drawImage(c._videoEl,dx,dy,dw,dh);
        drew=true;
      }
    });
  });

  if(!drew && tracks.some(t=>t.clips.length)){
    // black frame with timecode
    monCtx.fillStyle='rgba(255,255,255,.08)';
    monCtx.font='14px '+getComputedStyle(document.body).getPropertyValue('--mono');
    monCtx.textAlign='center';
    monCtx.fillText(fmtTimecode(currentTime), W/2, H/2);
  }
}

/* ══════════════════════════════════════════════════════
   TIMELINE RENDER
══════════════════════════════════════════════════════ */
function renderTimeline(){
  const scroll=document.getElementById('timeline-scroll');
  const totalW=Math.max(scroll.clientWidth, duration*zoom+200);
  const totalH=tracks.length*TRACK_H;

  rulerCanvas.width=totalW; rulerCanvas.height=RULER_H;
  tracksCanvas.width=totalW; tracksCanvas.height=totalH;
  document.getElementById('timeline-canvas-wrap').style.width=totalW+'px';

  drawRuler(rulerCtx, totalW);
  drawTracks(tracksCtx, totalW, totalH);
  renderTrackHeaders();
  updatePlayhead();
}

function drawRuler(ctx, W){
  ctx.fillStyle='#16161c';
  ctx.fillRect(0,0,W,RULER_H);
  ctx.strokeStyle='#2a2a38';
  ctx.lineWidth=1;
  ctx.fillStyle='#555568';
  ctx.font='10px DM Mono,monospace';
  ctx.textAlign='left';

  const step=pickStep(zoom);
  for(let t=0;t<=duration+step;t+=step){
    const x=Math.round(t*zoom);
    if(x>W) break;
    ctx.strokeStyle=t%1===0?'#2e2e3d':'#252530';
    ctx.beginPath(); ctx.moveTo(x,RULER_H); ctx.lineTo(x,RULER_H-8); ctx.stroke();
    if(x+4<W) ctx.fillText(fmtTimeShort(t),x+2,RULER_H-12);
  }
}

function pickStep(z){
  if(z>=200) return 0.5;
  if(z>=80) return 1;
  if(z>=40) return 2;
  if(z>=20) return 5;
  if(z>=10) return 10;
  return 30;
}

function drawTracks(ctx, W, H){
  ctx.fillStyle='#111116';
  ctx.fillRect(0,0,W,H);

  tracks.forEach((track,ti)=>{
    const ty=ti*TRACK_H;
    // track bg
    ctx.fillStyle=ti%2===0?'#111116':'#13131a';
    ctx.fillRect(0,ty,W,TRACK_H);
    // bottom line
    ctx.strokeStyle='#1e1e28';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,ty+TRACK_H); ctx.lineTo(W,ty+TRACK_H); ctx.stroke();

    // draw clips
    track.clips.forEach(c=>{
      const cx=c.startTime*zoom;
      const cw=Math.max(4,(c.endTime-c.startTime)*zoom);
      const isSelected=c.id===selectedClipId;

      // clip body
      const grad=ctx.createLinearGradient(cx,ty+4,cx,ty+TRACK_H-4);
      grad.addColorStop(0,lightenColor(c.color,15));
      grad.addColorStop(1,c.color);
      ctx.fillStyle=grad;
      roundRect(ctx,cx+1,ty+4,cw-2,TRACK_H-8,4);
      ctx.fill();

      // selection border
      if(isSelected){
        ctx.strokeStyle='#fff';
        ctx.lineWidth=1.5;
        roundRect(ctx,cx+1,ty+4,cw-2,TRACK_H-8,4);
        ctx.stroke();
      }

      // waveform / label
      ctx.save();
      ctx.beginPath(); roundRect(ctx,cx+1,ty+4,cw-2,TRACK_H-8,4); ctx.clip();
      if(track.type==='audio' && cw>20) drawWaveformMini(ctx,cx,ty,cw,TRACK_H,c.color);
      if(cw>40){
        ctx.fillStyle=isSelected?'#fff':'rgba(255,255,255,.85)';
        ctx.font='bold 10px Outfit,sans-serif';
        ctx.textAlign='left';
        ctx.fillText(c.name||'Clip',cx+6,ty+TRACK_H/2+4);
      }
      ctx.restore();

      // trim handles
      if(isSelected){
        ctx.fillStyle='rgba(255,255,255,.5)';
        ctx.fillRect(cx+1,ty+4,4,TRACK_H-8);
        ctx.fillRect(cx+cw-5,ty+4,4,TRACK_H-8);
      }
    });
  });
}

function drawWaveformMini(ctx,cx,ty,cw,th,color){
  ctx.strokeStyle='rgba(255,255,255,.25)';
  ctx.lineWidth=1;
  const cy=ty+th/2;
  const bars=Math.min(cw/2,80);
  for(let i=0;i<bars;i++){
    const x=cx+2+i*(cw-4)/bars;
    const h=(Math.random()*0.5+0.1)*(th/2-6);
    ctx.beginPath(); ctx.moveTo(x,cy-h); ctx.lineTo(x,cy+h); ctx.stroke();
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function lightenColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}

function renderTrackHeaders(){
  const headers=document.getElementById('track-headers');
  headers.innerHTML=tracks.map(t=>`
    <div class="track-header" style="height:${TRACK_H}px">
      <div class="th-icon">${t.type==='video'?'🎬':'🎵'}</div>
      <div class="th-label">${t.label}</div>
      <button class="th-mute ${t.muted?'muted':''}" onclick="toggleMute(${t.id})">${t.muted?'M':'m'}</button>
    </div>`).join('');
  // ruler spacer
  headers.style.paddingTop=RULER_H+'px';
}

function toggleMute(trackId){
  const t=tracks.find(x=>x.id===trackId);
  if(t){ t.muted=!t.muted; renderTrackHeaders(); }
}

/* ══════════════════════════════════════════════════════
   PLAYHEAD
══════════════════════════════════════════════════════ */
function updatePlayhead(){
  const x=currentTime*zoom;
  document.getElementById('playhead-line').style.transform=`translateX(${x}px)`;
  // auto-scroll to keep playhead in view
  const scroll=document.getElementById('timeline-scroll');
  const sw=scroll.clientWidth;
  const sl=scroll.scrollLeft;
  if(isPlaying){
    if(x<sl||x>sl+sw-60){
      scroll.scrollLeft=x-sw/3;
    }
  }
}

/* ══════════════════════════════════════════════════════
   POINTER EVENTS ON TIMELINE
══════════════════════════════════════════════════════ */
function timelineCoords(e){
  const rect=tracksCanvas.getBoundingClientRect();
  return{
    x:e.clientX-rect.left,
    y:e.clientY-rect.top
  };
}
function hitClip(x,y){
  const ti=Math.floor(y/TRACK_H);
  if(ti<0||ti>=tracks.length) return null;
  const track=tracks[ti];
  const t=x/zoom;
  return track.clips.find(c=>t>=c.startTime && t<=c.endTime)||null;
}

// Ruler click to seek
rulerCanvas.addEventListener('pointerdown',e=>{
  isScrubbingRuler=true;
  const rect=rulerCanvas.getBoundingClientRect();
  seekTo((e.clientX-rect.left)/zoom);
});
window.addEventListener('pointermove',e=>{
  if(isScrubbingRuler){
    const rect=rulerCanvas.getBoundingClientRect();
    seekTo((e.clientX-rect.left)/zoom);
  }
  if(isDraggingClip && dragClipId!==null){
    const rect=tracksCanvas.getBoundingClientRect();
    const x=e.clientX-rect.left-dragOffsetX;
    const t=Math.max(0,x/zoom);
    const ti=Math.max(0,Math.min(tracks.length-1,Math.floor((e.clientY-rect.top)/TRACK_H)));
    const clip=findClip(dragClipId);
    if(clip){
      const dur=clip.endTime-clip.startTime;
      let st=t;
      if(snapEnabled) st=snapToNearby(st,clip.id,tracks[ti]);
      clip.startTime=st;
      clip.endTime=st+dur;
      clip.trackId=tracks[ti].id;
      // move clip to correct track
      tracks.forEach(tr=>{ tr.clips=tr.clips.filter(c=>c.id!==dragClipId); });
      tracks[ti].clips.push(clip);
      recalcDuration();
      renderTimeline();
      updateStatus();
    }
  }
  if(isPanningTL){
    const scroll=document.getElementById('timeline-scroll');
    scroll.scrollLeft=panTLStart.scrollLeft-(e.clientX-panTLStart.x);
  }
});
window.addEventListener('pointerup',()=>{
  if(isDraggingClip) saveState();
  isScrubbingRuler=false;
  isDraggingClip=false;
  isPanningTL=false;
});

tracksCanvas.addEventListener('pointerdown',e=>{
  const {x,y}=timelineCoords(e);
  if(tool==='hand'){ isPanningTL=true; panTLStart={x:e.clientX,scrollLeft:document.getElementById('timeline-scroll').scrollLeft}; return; }
  if(tool==='razor'){ razorAt(x,y); return; }
  // select tool
  const clip=hitClip(x,y);
  if(clip){
    selectedClipId=clip.id;
    isDraggingClip=true;
    dragClipId=clip.id;
    dragOffsetX=x-clip.startTime*zoom;
    updateClipProps();
    renderTimeline();
  } else {
    selectedClipId=null;
    renderTimeline();
    updateClipProps();
  }
  updateStatus();
});

function snapToNearby(t,excludeId,track){
  const SNAP=0.1;
  let best=t, bestDist=SNAP;
  // snap to 0
  if(Math.abs(t)<bestDist){ bestDist=Math.abs(t); best=0; }
  track.clips.forEach(c=>{
    if(c.id===excludeId) return;
    if(Math.abs(t-c.endTime)<bestDist){ bestDist=Math.abs(t-c.endTime); best=c.endTime; }
    if(Math.abs(t-c.startTime)<bestDist){ bestDist=Math.abs(t-c.startTime); best=c.startTime; }
  });
  return best;
}

/* ══════════════════════════════════════════════════════
   EDITING OPERATIONS
══════════════════════════════════════════════════════ */
function splitAtPlayhead(){
  saveState();
  tracks.forEach(track=>{
    const toAdd=[];
    track.clips=track.clips.filter(c=>{
      if(currentTime>c.startTime+0.05 && currentTime<c.endTime-0.05){
        // split into two
        const left={...c,id:++uid,endTime:currentTime,outPoint:c.inPoint+(currentTime-c.startTime)*c.speed};
        const right={...c,id:++uid,startTime:currentTime,inPoint:left.outPoint};
        toAdd.push(left,right);
        return false;
      }
      return true;
    });
    track.clips.push(...toAdd);
    // sort
    track.clips.sort((a,b)=>a.startTime-b.startTime);
  });
  selectedClipId=null;
  recalcDuration(); renderTimeline(); updateStatus();
}

function razorAt(x,y){
  saveState();
  const ti=Math.floor(y/TRACK_H);
  if(ti<0||ti>=tracks.length) return;
  const t=x/zoom;
  const track=tracks[ti];
  const clip=track.clips.find(c=>t>c.startTime+0.05&&t<c.endTime-0.05);
  if(!clip) return;
  const left={...clip,id:++uid,endTime:t,outPoint:clip.inPoint+(t-clip.startTime)*clip.speed};
  const right={...clip,id:++uid,startTime:t,inPoint:left.outPoint};
  track.clips=track.clips.filter(c=>c.id!==clip.id);
  track.clips.push(left,right);
  track.clips.sort((a,b)=>a.startTime-b.startTime);
  recalcDuration(); renderTimeline(); updateStatus();
}

function deleteSelected(){
  if(!selectedClipId) return;
  saveState();
  tracks.forEach(t=>{ t.clips=t.clips.filter(c=>c.id!==selectedClipId); });
  selectedClipId=null;
  recalcDuration(); renderTimeline(); updateStatus(); updateClipProps();
}

function rippleGaps(){
  saveState();
  tracks.forEach(track=>{
    track.clips.sort((a,b)=>a.startTime-b.startTime);
    let cursor=0;
    track.clips.forEach(c=>{
      const dur=c.endTime-c.startTime;
      c.startTime=cursor; c.endTime=cursor+dur;
      cursor+=dur;
    });
  });
  recalcDuration(); renderTimeline(); updateStatus();
}

function findClip(id){
  for(const t of tracks){ const c=t.clips.find(x=>x.id===id); if(c) return c; }
  return null;
}

/* ══════════════════════════════════════════════════════
   CLIP PROPERTIES
══════════════════════════════════════════════════════ */
function updateClipProps(){
  const clip=findClip(selectedClipId);
  if(!clip){
    document.getElementById('clip-info').textContent='No clip selected';
    return;
  }
  document.getElementById('clip-vol').value=clip.volume;
  document.getElementById('clip-vol-val').textContent=Math.round(clip.volume*100)+'%';
  document.getElementById('clip-speed').value=clip.speed;
  document.getElementById('clip-speed-val').textContent=clip.speed+'×';
  document.getElementById('clip-info').textContent=`${clip.name} · ${fmtTime(clip.endTime-clip.startTime)}`;
}
function setClipVolume(v){
  const clip=findClip(selectedClipId); if(!clip) return;
  clip.volume=parseFloat(v);
  document.getElementById('clip-vol-val').textContent=Math.round(v*100)+'%';
}
function setClipSpeed(v){
  const clip=findClip(selectedClipId); if(!clip) return;
  clip.speed=parseFloat(v);
  document.getElementById('clip-speed-val').textContent=v+'×';
}
function setMasterVol(v){
  if(masterGain) masterGain.gain.value=parseFloat(v);
}

/* ══════════════════════════════════════════════════════
   ZOOM
══════════════════════════════════════════════════════ */
function zoomIn(){ zoom=Math.min(500,zoom*1.4); updateZoomDisplay(); renderTimeline(); }
function zoomOut(){ zoom=Math.max(5,zoom/1.4); updateZoomDisplay(); renderTimeline(); }
function zoomFit(){
  if(!duration){ zoom=100; }
  else{
    const sw=document.getElementById('timeline-scroll').clientWidth;
    zoom=Math.max(5,sw/(duration+1));
  }
  updateZoomDisplay(); renderTimeline();
}
function updateZoomDisplay(){
  document.getElementById('zoom-display').textContent=Math.round(zoom)+'px/s';
}
function toggleSnap(){
  snapEnabled=!snapEnabled;
  document.getElementById('snap-btn').classList.toggle('active',snapEnabled);
}

// Mouse wheel zoom on timeline
document.getElementById('timeline-scroll').addEventListener('wheel',e=>{
  if(e.ctrlKey||e.metaKey){ e.preventDefault(); e.deltaY<0?zoomIn():zoomOut(); }
},{passive:false});

/* ══════════════════════════════════════════════════════
   TOOL
══════════════════════════════════════════════════════ */
function setTool(t){
  tool=t;
  ['select','razor','hand'].forEach(k=>{
    const el=document.getElementById('tool-'+k);
    if(el) el.classList.toggle('active',k===t);
  });
  document.getElementById('sb-tool').textContent=t.charAt(0).toUpperCase()+t.slice(1);
  tracksCanvas.style.cursor=t==='razor'?'col-resize':t==='hand'?'grab':'default';
}

/* ══════════════════════════════════════════════════════
   TIMECODES & STATUS
══════════════════════════════════════════════════════ */
function fmtTime(s){
  if(!s||isNaN(s)) return '0:00';
  const m=Math.floor(s/60); return m+':'+Math.floor(s%60).toString().padStart(2,'0');
}
function fmtTimecode(s){
  if(!s||isNaN(s)) return '00:00:00:00';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60), f=Math.floor((s%1)*30);
  return [h,m,sec,f].map(x=>x.toString().padStart(2,'0')).join(':');
}
function fmtTimeShort(s){
  if(!s) return '0:00';
  const m=Math.floor(s/60); return m+':'+Math.floor(s%60).toString().padStart(2,'0');
}
function updateTimecodes(){
  const tc=fmtTimecode(currentTime);
  document.getElementById('tb-timecode').textContent=tc;
  document.getElementById('mon-time').textContent=fmtTime(currentTime)+' / '+fmtTime(duration);
  document.getElementById('sb-ph').textContent=fmtTime(currentTime);
}
function updateStatus(){
  const total=tracks.reduce((s,t)=>s+t.clips.length,0);
  document.getElementById('sb-clips').textContent=total;
}

/* ══════════════════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  if((e.ctrlKey||e.metaKey)&&!e.altKey&&e.code==='KeyZ'){ e.preventDefault(); undo(); return; }
  if((e.altKey)&&e.code==='KeyZ'){ e.preventDefault(); redo(); return; }
  if(e.code==='KeyV') setTool('select');
  if(e.code==='KeyC') setTool('razor');
  if(e.code==='KeyH') setTool('hand');
  if(e.code==='Delete'||e.code==='Backspace') deleteSelected();
  if(e.code==='ArrowLeft'){ e.preventDefault(); seekTo(currentTime-(e.shiftKey?1:1/30)); }
  if(e.code==='ArrowRight'){ e.preventDefault(); seekTo(currentTime+(e.shiftKey?1:1/30)); }
  if((e.ctrlKey||e.metaKey)&&e.code==='Equal') zoomIn();
  if((e.ctrlKey||e.metaKey)&&e.code==='Minus') zoomOut();
  if(e.code==='Home') gotoStart();
  if(e.code==='End') gotoEnd();
});

/* ══════════════════════════════════════════════════════
   DRAG MEDIA FROM PANEL TO TIMELINE
══════════════════════════════════════════════════════ */
tracksCanvas.addEventListener('dragover',e=>e.preventDefault());
tracksCanvas.addEventListener('drop',e=>{
  e.preventDefault();
  const assetId=parseInt(e.dataTransfer.getData('text/plain'));
  if(assetId) addToTimeline(assetId);
});

  alert('Export:\n\nTrue video export from a browser requires a backend service (like FFmpeg on a server).\n\nFor now, use this workflow:\n1. Record your screen while playing the timeline\n2. Or push your project to a server with FFmpeg\n\nAll your edits are stored as non-destructive JSON — just note your clip positions!');
}

/* ══════════════════════════════════════════════════════
   MOBILE
══════════════════════════════════════════════════════ */
function toggleMobilePanel(){
  document.getElementById('left-panel').classList.toggle('open');
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
function init(){
  resizeMonitor();
  renderTimeline();
  updateTimecodes();
  updateStatus();
  setTool('select');
  toggleSnap();
  // start idle render loop for monitor
  function idleLoop(){
    if(!isPlaying) renderMonitor();
    requestAnimationFrame(idleLoop);
  }
  idleLoop();
}

window.addEventListener('resize',()=>{
  resizeMonitor();
  renderTimeline();
});

init();
</script>
